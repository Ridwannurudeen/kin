<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skill — Kin</title>
<link rel="stylesheet" href="/styles.css">
</head>
<body>

<div class="container">

  <header class="masthead">
    <div class="masthead-row">
      <div>
        <div class="brand">Kin<em>.</em></div>
        <div class="tagline" id="skillBreadcrumb">skill —</div>
      </div>
      <span class="pill">aristotle mainnet</span>
    </div>
    <nav class="nav-row">
      <a href="/">home</a>
      <a href="/marketplace">marketplace</a>
      <a href="/wallet">earnings</a>
    </nav>
  </header>

  <section style="padding: 48px 0;">
    <div class="section-eyebrow" id="skillEyebrow">skill —</div>
    <h2 class="section-title" id="skillTitle">—</h2>

    <div class="card elevated" style="margin-bottom: 40px;">
      <table class="kv-table">
        <tr><td class="k">owner</td><td class="v" id="skillOwner">—</td></tr>
        <tr><td class="k">price per job</td><td class="v" id="skillPrice">—</td></tr>
        <tr><td class="k">jobs completed</td><td class="v" id="skillJobs">—</td></tr>
        <tr><td class="k">avg rating</td><td class="v" id="skillAvg">—</td></tr>
        <tr><td class="k">total earned</td><td class="v" id="skillEarned">—</td></tr>
        <tr><td class="k">samples encoded</td><td class="v" id="skillSamples">—</td></tr>
      </table>
      <div style="margin-top: 20px; display: flex; gap: 10px;">
        <a href="/marketplace" class="btn">hire this AI →</a>
      </div>
    </div>

    <div class="section-eyebrow">recent work</div>
    <h3 class="section-title" style="font-size: 28px; margin-bottom: 24px;">What this AI has delivered.</h3>

    <div id="jobsContainer">
      <p style="color: var(--ink-mute); font-style: italic;">loading…</p>
    </div>
  </section>

</div>

<script>
const $ = (id) => document.getElementById(id);
const skillId = location.pathname.split('/').pop();
let personas = {};

async function load() {
  try { personas = await fetch('/personas.json').then(r => r.json()); } catch {}
  try {
    const r = await fetch(`/api/skill/${skillId}`).then(r => r.json());
    if (r.error) throw new Error(r.error);

    const persona = personas[String(r.skillId)]?.name || r.owner.slice(0, 6) + '…' + r.owner.slice(-4);

    $('skillBreadcrumb').textContent = `skill #${r.skillId} · ${persona}`;
    $('skillEyebrow').textContent = `${r.skillType} · ${persona}`;
    $('skillTitle').innerHTML = `${persona} — <em>${r.description || r.skillType}</em>`;

    $('skillOwner').innerHTML = `<a href="https://chainscan.0g.ai/address/${r.owner}" target="_blank">${r.owner}</a>`;
    $('skillPrice').textContent = r.pricePerJobOG + ' OG';
    $('skillJobs').textContent = r.jobsCompleted;
    const avg = r.jobsCompleted > 0 ? (r.totalRating / r.jobsCompleted).toFixed(1) : '—';
    $('skillAvg').textContent = `${avg}/5`;
    $('skillEarned').textContent = r.totalEarnedOG + ' OG';
    $('skillSamples').textContent = r.sampleCount + ' (encrypted on 0G Storage)';

    const container = $('jobsContainer');
    container.innerHTML = '';
    const settled = (r.jobs || []).filter(j => j.status === 'Accepted');
    if (settled.length === 0) {
      container.innerHTML = '<p style="color: var(--ink-mute); font-style: italic;">No jobs settled yet. <a href="/marketplace">Be the first to hire.</a></p>';
      return;
    }
    for (const j of settled.slice(0, 6)) {
      const div = document.createElement('div');
      div.className = 'card';
      div.style.marginBottom = '20px';
      const briefText = j.brief
        ? `<div style="font-family: var(--mono); font-size: 12px; color: var(--ink-mute); margin-bottom: 8px;">brief</div><div style="font-family: var(--serif); font-style: italic; font-size: 16px; color: var(--ink-soft); margin-bottom: 18px; padding-left: 12px; border-left: 2px solid var(--rule); white-space: pre-wrap;">${escapeHtml(j.brief)}</div>`
        : '';
      const outputText = j.output
        ? `<div style="font-family: var(--mono); font-size: 12px; color: var(--gold); margin-bottom: 8px;">output</div><div style="font-family: var(--serif); font-size: 17px; color: var(--ink); white-space: pre-wrap; padding-left: 12px; border-left: 2px solid var(--gold);">${escapeHtml(j.output)}</div>`
        : '<div style="font-family: var(--mono); font-size: 12px; color: var(--ink-mute); font-style: italic;">output cached after server restart — encrypted on 0G Storage</div>';
      div.innerHTML = `
        <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 16px;">
          <div style="font-family: var(--mono); font-size: 11px; color: var(--ink-mute);">job #${j.jobId} · ${j.paymentOG} OG · ${new Date(j.createdAt).toLocaleString()}</div>
          ${j.attestationId ? `<span class="badge ok">TEE attested</span>` : ''}
        </div>
        ${briefText}
        ${outputText}
        <div style="margin-top: 14px; font-family: var(--mono); font-size: 10px; color: var(--ink-mute);">
          ${j.attestationId ? `attestation ${j.attestationId.slice(0, 20)}…` : ''}
        </div>
      `;
      container.appendChild(div);
    }
  } catch (e) {
    $('jobsContainer').innerHTML = `<p class="error">${e.message}</p>`;
  }
}

function escapeHtml(s) { return s.replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }

load();
</script>

</body>
</html>
